# Diz para o Quarkus usar o H2 em memória
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:pitangadb

# Pede para o Quarkus criar as tabelas automaticamente
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.rest-client.analytics-api.url=http://localhost:8081
